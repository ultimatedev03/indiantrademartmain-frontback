# Render Blueprint — IndianTradeMart Backend API
# Deploy: connect this repo to Render and it auto-reads this file.

services:
  - type: web
    name: indiantrademart-api
    runtime: node
    region: singapore         # closest to India
    plan: free                # change to 'starter' for production
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # --- Supabase ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

      # --- Auth ---
      - key: JWT_SECRET
        sync: false
      - key: AUTH_COOKIE_DOMAIN
        sync: false

      # --- Cloudinary ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Redis (Upstash) ---
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      # --- Email ---
      - key: GMAIL_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

      # --- Razorpay ---
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # --- AI Chatbot ---
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
