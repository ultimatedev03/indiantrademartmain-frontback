[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  NPM_CONFIG_PRODUCTION = "false"

# ── API proxy → Render backend ──────────────────────────────────────────────
# All /api/* requests are proxied to the Render backend.
# Set RENDER_BACKEND_URL in Netlify env vars, e.g. https://indiantrademart-api.onrender.com
[[redirects]]
  from = "/api/*"
  to = ":RENDER_BACKEND_URL/api/:splat"
  status = 200
  force = true

# Health check proxy
[[redirects]]
  from = "/health"
  to = ":RENDER_BACKEND_URL/health"
  status = 200
  force = true

# ── SPA fallback ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), hid=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"
    Origin-Agent-Cluster = "?1"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = """default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://challenges.cloudflare.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https: https://www.google-analytics.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* wss: https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com https://challenges.cloudflare.com; media-src 'self' data: blob: https:; worker-src 'self' blob:"""

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/itm-logo.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
